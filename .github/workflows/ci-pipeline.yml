name: Continuous Integration Pipeline (Production Ready)
run-name: Build & Test by ${{ github.actor }}

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  POSTGRES_DB: 'testdb'
  POSTGRES_USER: 'testuser'
  POSTGRES_PASSWORD: 'testpassword'
  ARTIFACT_PATH: 'target'
  ARTIFACT_FILENAME: 'backend-service'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: KIỂM THỬ VÀ ĐÓNG GÓI ỨNG DỤNG (JAVA/MAVEN)
  # ─────────────────────────────────────────────────────────────────
  test-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: ${{env.POSTGRES_DB}}
          POSTGRES_USER: ${{env.POSTGRES_USER}}
          POSTGRES_PASSWORD: ${{env.POSTGRES_PASSWORD}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: ${{env.JAVA_DISTRIBUTION}}
          java-version: ${{env.JAVA_VERSION}}
          cache: 'maven'

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: Build Package (JAR)
        run: mvn package -DskipTests

      # Lưu lại file JAR vừa build làm tư liệu để truyền sang Job sau
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_FILENAME}}
          path: ${{env.ARTIFACT_PATH}}/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: ĐÓNG GÓI DOCKER, SMOKE TEST VÀ PUSH IMAGE
  # ─────────────────────────────────────────────────────────────────
  docker-smoke-and-push:
    runs-on: ubuntu-latest
    needs: test-and-package # Ràng buộc: Chỉ chạy khi Job 1 thành công
    permissions:
      contents: read
    timeout-minutes: 15

    # Smoke Test chạy giả lập container thật nên vẫn cần các service này để kết nối
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: ${{env.POSTGRES_DB}}
          POSTGRES_USER: ${{env.POSTGRES_USER}}
          POSTGRES_PASSWORD: ${{env.POSTGRES_PASSWORD}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Tải file JAR đã build ở Job 1 xuống để build Docker (tránh build lại từ đầu)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{env.ARTIFACT_FILENAME}}
          path: ${{env.ARTIFACT_PATH}}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: backend-service:candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image for smoke test
        run: docker load --input /tmp/image.tar

      - name: Run Smoke Test
        run: |
          docker run -d --name test-app \
            --network host \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SERVER_PORT=8080 \
            -e DATABASE_HOST=127.0.0.1 \
            -e DATABASE_PORT=5432 \
            -e DATABASE_NAME=${{env.POSTGRES_DB}} \
            -e DATABASE_USERNAME=${{env.POSTGRES_USER}} \
            -e DATABASE_PASSWORD=${{env.POSTGRES_PASSWORD}} \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e EMAIL_USERNAME=dummy@localhost \
            -e EMAIL_PASSWORD=dummy \
            -e JWT_ACCESS_KEY=P4ZYyX8Iw2sBVFN8DtDEqa9AlCli1MxFTZzH4fxd1Vk \
            -e JWT_REFRESH_KEY=P4ZYyX8Iw2sBVFN8DtDEqa9AlCli1MxFTZzH4fxd1Vk \
            -e AWS_ACCESS_KEY=dummy \
            -e AWS_SECRET_KEY=dummy \
            backend-service:candidate
          
          echo "Waiting for application to start..."
          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ || echo "000")
          
            if [ "$HTTP_STATUS" != "000" ] && [ "$HTTP_STATUS" != "" ]; then
              echo "✅ Application is UP and responding with HTTP Status: $HTTP_STATUS"
              exit 0
            fi
            echo "Trying to start the application"
            sleep 2
          done
          
          echo "❌ Smoke Test Failed! Printing logs:"
          docker logs test-app
          exit 1

      - name: Cleanup Container
        if: always()
        run: docker stop test-app 2>/dev/null || true && docker rm test-app 2>/dev/null || true

      - name: Set short SHA
        if: github.event_name == 'push'
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Push verified image
        if: github.event_name == 'push'
        run: |
          docker tag backend-service:candidate ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ env.SHORT_SHA }}
          docker tag backend-service:candidate ${{ secrets.DOCKER_USERNAME }}/backend-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-service:latest