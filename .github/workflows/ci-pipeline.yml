name: Continuous Integration Pipeline (Production Ready)
run-name: Build & Test by ${{ github.actor }}

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: backend-service:candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image for smoke test
        run: docker load --input /tmp/image.tar

      - name: Run Smoke Test
        run: |
          docker run -d --name test-app \
            --network host \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SERVER_PORT=8080 \
            -e MANAGEMENT_SERVER_PORT=8080 \
            -e DATABASE_HOST=127.0.0.1 \
            -e DATABASE_PORT=5432 \
            -e DATABASE_NAME=testdb \
            -e DATABASE_USERNAME=testuser \
            -e DATABASE_PASSWORD=testpassword \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e EMAIL_USERNAME=dummy@localhost \
            -e EMAIL_PASSWORD=dummy \
            -e JWT_ACCESS_KEY=P4ZYyX8Iw2sBVFN8DtDEqa9AlCli1MxFTZzH4fxd1Vk \
            -e JWT_REFRESH_KEY=P4ZYyX8Iw2sBVFN8DtDEqa9AlCli1MxFTZzH4fxd1Vk \
            -e AWS_ACCESS_KEY=dummy \
            -e AWS_SECRET_KEY=dummy \
            backend-service:candidate
          
          echo "Waiting for application to start..."
          for i in {1..30}; do
            # Lấy mã HTTP trả về từ server (ví dụ: 200, 401, 404...). Nếu server chết, nó trả về 000.
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ || echo "000")
          
            if [ "$HTTP_STATUS" != "000" ] && [ "$HTTP_STATUS" != "" ]; then
              echo "✅ Application is UP and responding with HTTP Status: $HTTP_STATUS"
              exit 0
            fi
            sleep 2
          done
          
          echo "❌ Smoke Test Failed! Printing logs:"
          docker logs test-app
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop test-app 2>/dev/null || true && docker rm test-app 2>/dev/null || true

      - name: Push verified image
        run: |
          docker tag backend-service:candidate \
            ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}