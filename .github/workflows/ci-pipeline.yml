name: Continuous Integration Pipeline (Production Ready)
run-name: Build & Test by ${{ github.actor }}

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # GITHUB_TOKEN chỉ được đọc code
    timeout-minutes: 20   # tự fail sau 20 phút nếu bị treo

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # --- GIAI ĐOẠN 1: KHỞI TẠO & THÔNG TIN ---
      - name: Log Trigger Info
        run: |
          echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
          echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
          echo "🔎 Branch: ${{ github.ref }} | Repository: ${{ github.repository }}"

      - name: Checkout code
        uses: actions/checkout@v6

      # --- GIAI ĐOẠN 2: BUILD & TEST ỨNG DỤNG (JAVA/MAVEN) ---
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven' # Tối ưu tốc độ tải thư viện Maven

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: Build with Maven
        run: mvn package -DskipTests

      # --- GIAI ĐOẠN 3: ĐĂNG NHẬP & CẤU HÌNH DOCKER ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- GIAI ĐOẠN 4: SMOKE TEST (CHẶN ĐỨNG IMAGE LỖI RUNTIME) ---
      # --- Bước 1: Build và export ra tar (chưa push) ---
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true        # nạp vào Docker daemon local
          tags: backend-service:candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar  # export ra file

      # --- Bước 2: Smoke test trên đúng image đó ---
      - name: Load image for smoke test
        run: docker load --input /tmp/image.tar

      - name: Run Smoke Test
        run: |
          docker run -d --name test-app -p 8080:8080 backend-service:candidate
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Healthy!"
              exit 0
            fi
            sleep 2
          done
          docker logs test-app
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop test-app 2>/dev/null || true && docker rm test-app 2>/dev/null || true

      # --- GIAI ĐOẠN 5: PUSH IMAGE SẠCH LÊN REGISTRY ---
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Push verified image
        run: |
          docker tag backend-service:candidate \
            ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}