server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env.dev[.properties]
      - classpath:init-data/init_data.yaml

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 30
        order_inserts: true
        order_updates: true
        generate_statistics: true
  output:
    ansi:
      enabled: always
  cache:
    type: redis
    data:
      redis:
        host: localhost
        port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
  threads:
    virtual:
      enabled: true


jwt:
  access_token:
    secret: ${ACCESS_KEY}
    expiration: 1
  refresh_token:
    secret: ${REFRESH_KEY}
    expiration: 14
  verification_token:
    secret: ${VERIFICATION_KEY}
    expiration: 15
  issuer: http://localhost:8080
  audience: backend-service

aws:
  access-key-id: ${AWS_ACCESS_KEY}
  secret-key-id: ${AWS_SECRET_KEY}
  region: ap-southeast-1
  bucket-name: nhpdev-media-2

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.stat: DEBUG
    org.hibernate.orm.jdbc.batch: TRACE
    com.nhpdev.backendservicesecond: DEBUG
    org.springframework.cache: TRACE
    org.springframework.data.redis: TRACE
