init-data:
  roles:
    - name: "SUPER_ADMIN"
      description: "Super administrator - manage roles and permissions only"
      permissions:
        - "role:read"
        - "role:update"
        - "permission:read"
        - "permission:update"
        - "user:assign_role"
        - "permission:assign"
        - "post:delete_hard"
        - "user:delete_hard"

    - name: "ADMIN"
      description: "Administrator - manage users only"
      permissions:
        - "user:read"
        - "user:read_own"
        - "user:create"
        - "user:update"
        - "user:delete_soft"
        - "post:delete_soft_any"

    - name: "AUTHOR"
      description: "Author with content management access"
      permissions:
        - "post:create"
        - "post:update_own"
        - "post:delete_soft_own"
        - "post:read"

    - name: "MEMBER"
      description: "Member with read only access"
      permissions:
        - "post:read"


  admin:
    email: "admin@admin.com"
    display-name: "Administrator"
    password: "Admin@123"

  super_admin:
    email: "superadmin@admin.com"
    display-name: "super Administrator"
    password: "Superadmin@123"